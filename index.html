    <div class="sidebar-header">
      <span class="logo-mini">N</span>
      <button class="close-btn" id="closeSidebar" aria-label="메뉴 닫기">×</button>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active">
        <span class="nav-icon">🏠</span>

      <a href="calendar.html" class="nav-item">

        <span class="nav-icon">📚</span>
        <span>라이브러리</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="settings.html" class="nav-item small">
        <span class="nav-icon">⚙️</span>
        <span>설정</span>
      </a>
    </div>

  <div class="overlay" id="overlay"></div>

  <!-- 상단 헤더 -->
  <header class="header">
    <button class="icon-btn" id="openSidebar" aria-label="메뉴 열기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="logo">
      <span class="logo-dot"></span>
      NEWSHOT
    </div>

    <span class="icon-btn placeholder" aria-hidden="true"></span>
  </header>

  <main class="main">
    <!-- 인사 영역 -->
    <section class="greeting">
      <p class="date">2026년 4월 15일 수요일</p>
      <h1>오늘의 이슈, <br/>5초 만에 파악하세요.</h1>
    </section>

    <!-- 관심 뉴스 피드 -->
    <section class="section">
      <div class="section-head">
        <h2>
          <span class="section-accent">#</span> 관심 뉴스
        </h2>
        <button class="text-btn">전체보기</button>
      </div>
      <p class="section-sub" id="kwSub"></p>

      <div class="news-list" id="newsList">
        <!-- 뉴스 카드가 자바스크립트로 렌더링됩니다 -->
      </div>
    </section>

    <!-- 오늘의 키워드 TOP 3 -->
    <section class="section">
      <div class="section-head">
        <h2>
          <span class="section-accent">🔥</span> 오늘의 키워드
        </h2>
        <span class="badge">TOP 3</span>
      </div>
      <p class="section-sub">장르 불문, 지금 가장 많이 언급된 키워드</p>

      <div class="keyword-grid" id="keywordGrid">
        <!-- 키워드 카드가 자바스크립트로 렌더링됩니다 -->
      </div>
    </section>

    <div class="bottom-spacer"></div>
  </main>
