<!DOCTYPE html>
<html lang="ko">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2" />

<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo-mini">N</span>
      <button class="close-btn" id="closeSidebar" aria-label="메뉴 닫기">×</button>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>홈</span></a>
      <a href="calendar.html" class="nav-item"><span class="nav-icon">📅</span><span>이슈 캘린더</span></a>
      <a href="library.html" class="nav-item"><span class="nav-icon">📚</span><span>라이브러리</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="settings.html" class="nav-item small"><span class="nav-icon">⚙️</span><span>설정</span></a>
    </div>
  </aside>
  <div class="overlay" id="overlay"></div>

  <header class="header">
    <button class="icon-btn" id="openSidebar" aria-label="메뉴 열기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="logo"><span class="logo-dot"></span>NEWSHOT</div>
    <span class="icon-btn placeholder" aria-hidden="true"></span>
  </header>

  <!-- 브레드크럼 (어디에서 왔는지 명확히) -->
  <nav class="breadcrumb" id="breadcrumb" aria-label="경로">
    <button class="crumb-back" id="crumbBack" aria-label="뒤로 가기">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span id="crumbBackLabel">홈으로</span>
    </button>
    <div class="crumb-trail" id="crumbTrail"></div>
  </nav>

  <main class="main">
    <!-- 키워드 히어로 -->
    <section class="kw-hero">
      <p class="kw-eyebrow">키워드 피드</p>
      <h1 id="kwTitle"># </h1>
      <div class="kw-stats" id="kwStats"></div>
      <p class="kw-why" id="kwWhy"></p>
    </section>

    <!-- 관련 키워드 -->
    <section class="kw-related" id="kwRelatedWrap" style="display:none">
      <div class="section-head"><h2>함께 언급된 키워드</h2></div>
      <div class="related-chips" id="kwRelated"></div>
    </section>

    <!-- 기사 목록 -->
    <section class="section">
      <div class="section-head">
        <h2 id="articlesTitle">관련 기사</h2>
        <span class="count-pill" id="articlesCount">0건</span>
      </div>
      <div class="news-list" id="newsList"></div>
    </section>

    <div class="bottom-spacer"></div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>홈</span>
    </a>
    <a href="calendar.html" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>캘린더</span>
    </a>
    <a href="library.html" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span>라이브러리</span>

      <span>설정</span>
    </a>
  </nav>

  <script src="data.js"></script>

</html>
