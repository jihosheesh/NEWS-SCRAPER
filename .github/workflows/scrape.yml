name: 뉴스 자동 스크래핑

on:
  schedule:
    - cron: '0 * * * *'   # 매시간 정각 자동 실행 (UTC 기준 = 한국 +9시간)
  workflow_dispatch:        # GitHub 웹에서 수동 실행 버튼도 제공

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 스크래퍼 실행
        run: python scraper.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "NEWSHOT Bot"
          git config user.email "action@github.com"
          git add data.js
          git diff --staged --quiet && echo "변경 없음 — 스킵" || (
            git commit -m "data: 자동 뉴스 업데이트 $(date +'%Y-%m-%d %H:%M UTC')" &&
            git push
          )
