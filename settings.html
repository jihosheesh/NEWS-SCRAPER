<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2" />
  <link rel="stylesheet" href="settings.css?v=2" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo-mini">N</span>
      <button class="close-btn" id="closeSidebar" aria-label="메뉴 닫기">×</button>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>홈</span></a>
      <a href="calendar.html" class="nav-item"><span class="nav-icon">📅</span><span>이슈 캘린더</span></a>
      <a href="library.html" class="nav-item"><span class="nav-icon">📚</span><span>라이브러리</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="settings.html" class="nav-item small active">
        <span class="nav-icon">⚙️</span>
        <span>설정</span>
      </a>
    </div>
  </aside>
  <div class="overlay" id="overlay"></div>

  <header class="header">
    <button class="icon-btn" id="openSidebar" aria-label="메뉴 열기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="logo"><span class="logo-dot"></span>NEWSHOT</div>
    <span class="icon-btn placeholder" aria-hidden="true"></span>
  </header>

  <main class="main">
    <section class="set-hero">
      <p class="date">개인화 설정</p>
      <h1>설정</h1>
    </section>

    <!-- 관심 키워드 -->
    <section class="set-card">
      <div class="set-card-head">
        <div>
          <h2 class="set-card-title">관심 키워드</h2>
          <p class="set-card-sub">홈 피드가 선택한 키워드 기사 위주로 구성돼요.</p>
        </div>
        <span class="kw-count-badge" id="kwCount">0</span>
      </div>

      <!-- 현재 키워드 -->
      <div class="kw-current" id="kwCurrent"></div>

      <!-- 추가 입력 -->
      <div class="kw-input-row">
        <input
          type="text"
          id="kwInput"
          class="kw-input"
          placeholder="키워드 직접 입력 (예: 테슬라)"
          maxlength="20"
          autocomplete="off"
        />
        <button class="kw-add-btn" id="kwAddBtn">추가</button>
      </div>

      <!-- 추천 키워드 -->
      <div class="kw-suggest-wrap">
        <p class="kw-suggest-label">추천 키워드</p>
        <div class="kw-suggest" id="kwSuggest"></div>
      </div>
    </section>

    <!-- 데이터 관리 -->
    <section class="set-card">
      <div class="set-card-head">
        <div>
          <h2 class="set-card-title">데이터 관리</h2>
          <p class="set-card-sub">앱에 저장된 개인화 데이터를 초기화해요.</p>
        </div>
      </div>

      <div class="data-actions">
        <div class="data-action-row">
          <div class="data-action-info">
            <span class="data-action-name">활동 기록 초기화</span>
            <span class="data-action-desc">조회·좋아요 기록, 키워드 점수</span>
          </div>
          <button class="reset-btn" id="resetActivity">초기화</button>
        </div>
        <div class="data-divider"></div>
        <div class="data-action-row">
          <div class="data-action-info">
            <span class="data-action-name">라이브러리 전체 삭제</span>
            <span class="data-action-desc">저장한 기사 전부 삭제</span>
          </div>
          <button class="reset-btn danger" id="resetLibrary">삭제</button>
        </div>
      </div>
    </section>

    <!-- 저장 완료 토스트 -->
    <div class="toast" id="toast"></div>

    <div class="bottom-spacer"></div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>홈</span>
    </a>
    <a href="calendar.html" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>캘린더</span>
    </a>
    <a href="library.html" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span>라이브러리</span>
    </a>
    <a href="settings.html" class="bnav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>설정</span>
    </a>
  </nav>

  <script src="settings.js?v=2"></script>
</body>
</html>
